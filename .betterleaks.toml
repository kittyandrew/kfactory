# kfactory secrets scan config -- runs alongside the other code-quality
# linters (golangci-lint, gofmt, alejandra, actionlint, zizmor). The
# scan is invoked via `nix develop -c betterleaks ...` from the dev
# shell + the quality job in .github/workflows/check.yml.
#
# Local pre-commit invocation + CI invocation are identical:
#   nix develop -c betterleaks dir . --no-banner --redact
# `dir .` scans the merge-state tree (what CI is about to ship), same
# scope as a diff-against-base on the kfactory size, but simpler --
# no fetch-depth: 0 in checkout, no branching for push vs PR events.

title = "kfactory secrets scan"

[extend]
useDefault = true

# `prefilter` skips entire files before any regex runs.
# tests/regression/configs/ holds bogus credentials that bypass OIDC --
# the regression-tests opencode server has no JWT validator, so the
# fake bearer/idp/client_id strings are deliberate (see
# tests/regression/configs/auth.json for the runtime contract).
prefilter = '''
attributes[?"path"].orValue("").startsWith("tests/regression/configs/")
'''

# `filter` runs per-finding (defense in depth if a `regression-fake-*`
# placeholder ever lands outside tests/regression/configs/).
filter = '''
matchesAny(finding["secret"], [r"""^regression-fake-[a-z]+$"""])
'''
