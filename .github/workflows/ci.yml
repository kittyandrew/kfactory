name: ci

# Token-free quality gates run on every PR and push. The secret-bearing Attic
# cache warmer is a separate default-branch job behind the `cache` environment.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: GitHub Actions lint (actionlint)
        run: nix develop -c actionlint

      - name: GitHub Actions security audit (zizmor)
        run: nix develop -c zizmor .github/workflows

      - name: Nix format (alejandra)
        run: nix develop -c alejandra -c .

      - name: Nix lint (deadnix)
        run: nix develop -c deadnix .

      - name: Go format (gofmt)
        run: |
          unformatted=$(nix develop -c gofmt -l cmd/)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would change these files:"
            echo "$unformatted"
            nix develop -c gofmt -d cmd/
            exit 1
          fi

      - name: Go lint (golangci-lint)
        run: nix develop -c golangci-lint run --timeout 5m ./...

      - name: Go test
        run: nix develop -c go test ./...

      # `dir .` scans the merge state on PRs (= what ships if merged);
      # allowlist (regression-tests fake bearer tokens) in .betterleaks.toml.
      - name: Secrets scan (betterleaks)
        run: nix develop -c betterleaks dir . --no-banner --redact

      - name: Flake check (builds all packages + checks)
        run: nix flake check --print-build-logs

  cache:
    name: attic cache
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    environment: cache

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Attic cache
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        with:
          endpoint: ${{ vars.ATTIC_ENDPOINT }}
          cache: general
          token: ${{ secrets.ATTIC_GENERAL_PUSH_TOKEN }}
          skip-push: "true"

      - name: Build cache roots
        run: |
          set -euo pipefail
          nix build --no-link --print-build-logs --print-out-paths \
            .#kfactory \
            .#oauth2-proxy-kfactory \
            .#checks.x86_64-linux.factory-opencode-kfactory \
            .#checks.x86_64-linux.opencode-pty \
            .#checks.x86_64-linux.factory-e2e-opencode-image \
            .#checks.x86_64-linux.factory-e2e-kfactory-client-image \
            | sort -u > "${RUNNER_TEMP}/attic-cache-roots"
          echo "Built curated Attic cache roots:"
          while IFS= read -r root; do
            echo "  $root"
          done < "${RUNNER_TEMP}/attic-cache-roots"

      - name: Push curated roots to Attic
        run: |
          set -euo pipefail
          mapfile -t roots < "${RUNNER_TEMP}/attic-cache-roots"
          if [ "${#roots[@]}" -eq 0 ]; then
            echo "::error::no curated Attic cache roots were built"
            exit 1
          fi
          echo "Pushing ${#roots[@]} curated roots and their runtime closures to Attic:"
          printf '  %s\n' "${roots[@]}"
          attic push general "${roots[@]}"
