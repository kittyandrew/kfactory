name: ci

# Single job: lint + flake check + (conditional) attic push.
#
# Attic setup step is `if:`-gated so PR/fork runs never see
# ATTIC_GENERAL_PUSH_TOKEN. Lint/test gates run BEFORE setup so the
# attic config only lands on disk after they pass (preserving "linters
# pass before secrets" property of the older two-job shape).
#
# Substituters: cache.nixos.org (always, set up by nix-installer-action)
# + Attic `general` (only on push-to-default; attic-action's default
# `skip-use: false` registers it).
#
# Push set: enumerate `.#checks.<system>.*` (flake's canonical "what
# kfactory verifies" -- folds in packages, plugins, typechecks via
# `packageChecks // pluginChecks // ...`). attic push resolves runtime
# closures, naturally skipping build-time-only paths (opencode-
# node_modules at 1.9 GiB, rustc, llvm, etc.) without a regex allowlist.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + flake check + attic push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: GitHub Actions lint (actionlint)
        run: nix develop -c actionlint

      - name: GitHub Actions security audit (zizmor)
        run: nix develop -c zizmor .github/workflows

      - name: Nix format (alejandra)
        run: nix develop -c alejandra -c .

      - name: Nix lint (deadnix)
        run: nix develop -c deadnix .

      - name: Go format (gofmt)
        run: |
          unformatted=$(nix develop -c gofmt -l cmd/)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would change these files:"
            echo "$unformatted"
            nix develop -c gofmt -d cmd/
            exit 1
          fi

      - name: Go lint (golangci-lint)
        run: nix develop -c golangci-lint run --timeout 5m ./...

      - name: Go test
        run: nix develop -c go test ./...

      # `dir .` scans the merge state on PRs (= what ships if merged);
      # allowlist (regression-tests fake bearer tokens) in .betterleaks.toml.
      - name: Secrets scan (betterleaks)
        run: nix develop -c betterleaks dir . --no-banner --redact

      # skip-push: true -- explicit `attic push` below pushes a curated
      # set (the action's auto-hook would push every store path that
      # appeared during the job, including build-time intermediates).
      - name: Setup Attic cache
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a # v0.5.0
        with:
          endpoint: ${{ vars.ATTIC_ENDPOINT }}
          cache: general
          token: ${{ secrets.ATTIC_GENERAL_PUSH_TOKEN }}
          skip-push: "true"

      - name: Flake check (builds all packages + checks)
        run: nix flake check --print-build-logs

      - name: Push to Attic
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          set -euo pipefail
          system="x86_64-linux"
          # `nix build` (not `nix-store --realise`) so we have the .drv
          # and can substitute OR build -- realise can only substitute,
          # which fails when `nix flake check` validated paths via
          # narinfo HEAD without copying bits locally.
          mapfile -t attrs < <(
            nix eval --json ".#checks.${system}" --apply 'builtins.attrNames' \
              | jq -r '.[]'
          )
          if [ "${#attrs[@]}" -eq 0 ]; then
            echo "::error::no checks enumerated for .#checks.${system}"
            exit 1
          fi
          refs=()
          for a in "${attrs[@]}"; do refs+=(".#checks.${system}.${a}"); done
          mapfile -t paths < <(nix build --no-link --print-out-paths "${refs[@]}")
          echo "Pushing ${#paths[@]} paths + their runtime closures to attic:"
          printf '  %s\n' "${paths[@]}"
          attic push general "${paths[@]}"
