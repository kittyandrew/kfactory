name: ci

# Two jobs:
#   - `quality` runs all linters + `nix flake check` (which builds every
#     `packages.${system}.*` output, registered as checks in flake.nix).
#     No secrets are exposed in this job, so it's safe to run on fork PRs.
#   - `build` runs only on push to the default branch. It re-runs
#     `nix flake check` with the Attic cache configured first, and the
#     attic-action post-hook pushes everything built in the job to the
#     `general` cache.
#
# Magic-nix-cache shares the `/nix/store` between jobs via GitHub Actions
# cache, so the `build` job's `nix flake check` is mostly cache hits --
# the only fresh work in `build` is the Attic upload.
#
# Adding a new package to `packages.${system}` in flake.nix automatically
# becomes a CI gate: `nix flake check` builds it; nothing to edit here.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + flake check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: GitHub Actions lint (actionlint)
        run: nix develop -c actionlint

      - name: GitHub Actions security audit (zizmor)
        run: nix develop -c zizmor .github/workflows

      - name: Nix format (alejandra)
        run: nix develop -c alejandra -c .

      - name: Nix lint (deadnix)
        run: nix develop -c deadnix .

      - name: Go format (gofmt)
        run: |
          unformatted=$(nix develop -c gofmt -l cmd/)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would change these files:"
            echo "$unformatted"
            nix develop -c gofmt -d cmd/
            exit 1
          fi

      - name: Go lint (golangci-lint)
        run: nix develop -c golangci-lint run --timeout 5m ./...

      - name: Go test
        run: nix develop -c go test ./...

      # Secrets scan. `dir .` scans the current tree (cheap, ~400 KB
      # / 200 ms for this repo today). On push to a default-branch
      # ref, `dir` is the same scope you'd get from a diff-against-base
      # anyway; on PR events we re-scan the merge state which is what
      # we ship if merged. Allowlist (e2e fake bearer tokens, etc.)
      # in `.betterleaks.toml`.
      - name: Secrets scan (betterleaks)
        run: nix develop -c betterleaks dir . --no-banner --redact

      - name: Flake check (builds all packages + checks)
        run: nix flake check --print-build-logs

  build:
    name: attic cache push
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: DeterminateSystems/nix-installer-action@21a544727d0c62386e78b4befe52d19ad12692e3

      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39

      - name: Setup Attic cache
        uses: ryanccn/attic-action@5635a15ef0c5462194ffbd05d1daeddc74625c3a
        with:
          endpoint: ${{ vars.ATTIC_ENDPOINT }}
          cache: general
          token: ${{ secrets.ATTIC_GENERAL_PUSH_TOKEN }}

      - name: Flake check (cache hits from quality job)
        run: nix flake check --print-build-logs
